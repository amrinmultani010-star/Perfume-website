<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<link rel="stylesheet" href="cart.css">

<style>

    /* Reset */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


/* Body Background */

body{
background:linear-gradient(135deg,#c8f7d0,#a6e9b7,#e6fff0);
min-height:100vh;
}


/* Header */

.header{
background:#2874f0;
color:white;
padding:16px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
}


/* Cart Container */

.container{
width:650px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}


/* Title */

h2{
margin-bottom:20px;
color:#333;
}


/* Cart Item */

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 10px;
border-bottom:1px solid #ddd;
}


/* Item Info */

.item-info{
font-size:16px;
color:#333;
}


/* Quantity Controls */

.qty-controls{
display:flex;
align-items:center;
gap:10px;
}


/* Quantity Buttons */

.qty-controls button{
padding:6px 10px;
border:none;
background:#2874f0;
color:white;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.qty-controls button:hover{
background:#1a5ed8;
}


/* Remove Button */

.remove-btn{
background:#ff4d4d;
}

.remove-btn:hover{
background:#e60000;
}


/* Summary */

.summary{
margin-top:20px;
font-size:18px;
color:#444;
}


/* Payment Dropdown */

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}


/* Checkout Button */

.checkout-btn{
margin-top:15px;
padding:12px;
width:100%;
background:#fb641b;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.checkout-btn:hover{
background:#e55300;
}


/* Explore Button */

.explore-btn{
margin-top:10px;
padding:12px;
width:100%;
background:#2874f0;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.explore-btn:hover{
background:#1a5ed8;
}


/* Mobile Responsive */

@media (max-width:700px){

.container{
width:90%;
}

.cart-item{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.qty-controls{
flex-wrap:wrap;
}

}
</style>
</head>

<body>

<div class="header">
Your Cart
</div>

<div class="container">

<h2>Shopping Cart</h2>

<div id="cart-items"></div>

<div class="summary">
<p>Total Items: <span id="cart-count">0</span></p>
<p>Grand Total: ₹<span id="cart-total">0</span></p>
</div>

<h3>Choose Payment Method</h3>

<select id="payment-method">
<option>Credit Card</option>
<option>Phone Pay</option>
<option>Paytm</option>
<option>Google Pay</option>
<option>PayPal</option>
<option>Cash on Delivery</option>
</select>

<button class="checkout-btn">Proceed to Payment</button>

<button class="explore-btn" onclick="exploreMore()">
Explore More Products
</button>

</div>

<script src="cart1.js"></script>

</body>
</html>
