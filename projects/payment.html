<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Page</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f1f3f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:400px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
}

.summary{
margin-bottom:20px;
font-size:18px;
}

button{
width:100%;
padding:12px;
background:#fb641b;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e55300;
}

</style>

</head>

<body>

<div class="container">

<h2>Order Payment</h2>

<div class="summary">
<p>Total Amount: ₹<span id="total-amount">0</span></p>
</div>

<button onclick="payNow()">Pay Now</button>

</div>

<!-- Razorpay checkout script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="payment.js"></script>

</body>
</html>
